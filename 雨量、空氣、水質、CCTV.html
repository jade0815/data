<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>火柴人動畫</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: transparent;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <script>
    function setup() {
      createCanvas(400, 300);
      angleMode(DEGREES);
      clear();  // 確保背景透明
    }

    function draw() {
      clear();  // 每一幀清除背景

      let centerX = 200;
      let centerY = 150;

      stroke(0);
      fill(255);
      ellipse(centerX, centerY - 40, 30, 30); // 頭部

      line(centerX, centerY - 25, centerX, centerY + 30); // 身體

      line(centerX, centerY + 30, centerX - 20, centerY + 60); // 左腿
      line(centerX, centerY + 30, centerX + 20, centerY + 60); // 右腿

      line(centerX, centerY, centerX - 30, centerY - 20); // 左手

      push();
      translate(centerX, centerY);
      let waveAngle = sin(frameCount * 5) * 30; // 揮手角度
      rotate(waveAngle);
      line(0, 0, 30, -20); // 右手
      pop();
    }
  </script>
</body>
</html>

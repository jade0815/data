<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心園平面機車停車場即時資料</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #fff;
	  padding-left: 0px;           /* ✅ 控制向右偏移的距離 */
    }

    /* 創建 iframe 容器 */
    .iframe-container {
      width: 830px;
      height: 1330px;  /* 設置顯示區域的高度 */
      position: relative;
      overflow: hidden;  /* 隱藏超出範圍的部分 */
    }

    /* iframe 裁切並定位 */
    iframe {
      width: 500px;
      height: 100%;
      border: none;
      position: absolute;
      top: -2270px;  /* 調整此值，裁切上方區域 */
      left: 0;
	  transform: scale(1.8); /* ✅ 放大倍率，例如 1.2 是放大 20% */
	  transform-origin: top left; /* ✅ 固定放大時的錨點位置 */
    }
  </style>
</head>
<body>

  <div class="iframe-container">
    <iframe src="https://apss.oga.ncku.edu.tw/park/"></iframe>
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心園平面機車停車場即時資料</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #fff;
	  justify-content: center; /* ✅ 水平置中 */
    align-items: center;     /* ✅ 垂直置中 */
    }

    /* 創建 iframe 容器 */
    .iframe-container {
      width: 255px;
      height: 1400px;  /* 設置顯示區域的高度 */
      position: relative;
      overflow: hidden;  /* 隱藏超出範圍的部分 */
    }

    /* iframe 裁切並定位 */
    iframe {
      width: 100%;
      height: 1425px;
      border: none;
      position: absolute;
      top:  -1752px;  /* 調整此值，裁切上方區域 */
      left: 10;
      transform: scale(1.3);
      transform-origin: top center;
    }
  </style>
</head>
<body>

  <div class="iframe-container">
    <iframe src="https://apss.oga.ncku.edu.tw/park/"></iframe>
  </div>

</body>
</html>
